baseURL = 'https://sametk0ca.github.io/'
defaultContentLanguage = 'en'
title = 'Samet Koca | Cyber Security'
theme = 'papermod'

[languages]
  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    contentDir = "content" # Unified content directory
    weight = 1
    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "about"
        name = "Whoami"
        url = "/about/"
        weight = 30

  [languages.tr]
    languageCode = "tr-tr"
    languageName = "Türkçe"
    contentDir = "content" # Same content directory
    weight = 2

[params]
  ShowToc = true
  defaultTheme = "dark"
  description = "Cyber Security Blog & Technical Research"
  author = "Samet Koca"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  
  # Hide the language switcher in the header
  disableLanguageAltLinks = true

  [params.profileMode]
    enabled = true
    title = "Samet Koca"
    subtitle = "Cyber Security Researcher"
    imageUrl = "/avatar.jpg"
    imageWidth = 120
    imageHeight = 120

  [params.toc]
    enable = true
    autoCollapse = false
    ordered = false

[markup.highlight]
  noClasses = false
  style = "dracula"
  tabWidth = 4
  lineNos = true
  guessSyntax = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
