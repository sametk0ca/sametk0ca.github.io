{{- if and (or .IsPage .IsSection) (ne .Section "weekly-news") -}}
<div class="newsletter-container" style="margin-top: 50px; padding: 30px; border: 1px solid var(--border); border-radius: 12px; text-align: center; background: var(--code-bg);">
    <h3 style="margin-top: 0;">Stay Updated</h3>
    <p style="font-size: 0.9em; opacity: 0.8;">Get the latest cybersecurity insights delivered to your inbox.</p>
    <form action="https://buttondown.email/api/emails/embed-subscribe/sametk0ca" method="post" target="popupwindow" onsubmit="window.open('https://buttondown.email/sametk0ca', 'popupwindow')" class="embeddable-buttondown-form" style="margin-top: 20px;">
        <input type="email" name="email" id="bd-email" placeholder="Enter your email" required style="padding: 10px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--theme); color: var(--primary); width: 100%; max-width: 250px; margin-bottom: 10px;">
        <input type="submit" value="Subscribe" style="padding: 10px 25px; border-radius: 6px; border: none; background: #32a852; color: white; cursor: pointer; font-weight: bold; transition: opacity 0.2s;">
    </form>
</div>

<!-- Bilingual Blog Post Language Switcher -->
<style>
  .post-lang-switcher {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 2rem;
    gap: 0.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  .post-lang-btn {
    background: var(--entry);
    border: 1px solid var(--border);
    color: var(--secondary);
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .post-lang-btn:hover {
    border-color: var(--secondary);
  }

  .post-lang-btn.active {
    background: var(--primary);
    color: var(--theme);
    border-color: var(--primary);
  }
</style>

<script>
  (function() {
    const postContent = document.querySelector(".post-content");
    if (!postContent) return;

    const children = Array.from(postContent.children);
    let splitIndex = -1;
    let trHeader = null;
    let enHeader = null;

    // 1. Deterministic Method: Search for explicit TR/EN section headers
    for (let i = 0; i < children.length; i++) {
      const child = children[i];
      const text = child.textContent.toUpperCase();
      const isHeading = /^H[1-6]$/.test(child.tagName);

      if (isHeading && (text.includes("(TR)") || text.includes("[TR]") || text.includes("TR:") || text === "TÜRKÇE")) {
        trHeader = child;
      }
      if (isHeading && (text.includes("(EN)") || text.includes("[EN]") || text.includes("EN:") || text === "ENGLISH")) {
        enHeader = child;
        splitIndex = i;
        break;
      }
    }

    // Split at preceding HR if it's next to the EN header
    if (splitIndex > 0 && children[splitIndex - 1].tagName === "HR") {
      splitIndex = splitIndex - 1;
    }

    // 2. Deterministic Fallback: Split at a single horizontal separator line (---)
    if (splitIndex === -1) {
      const hrIndices = [];
      children.forEach((child, idx) => {
        if (child.tagName === "HR") hrIndices.push(idx);
      });
      if (hrIndices.length === 1) {
        splitIndex = hrIndices[0];
      }
    }

    // 3. Heuristic Fallback: Statistical language boundary detection
    if (splitIndex === -1) {
      const trStopWords = new Set(["ve", "bir", "bu", "da", "de", "için", "ile", "en", "olan", "olarak", "ise", "veya", "ama", "nedir", "nelerdir", "gibi", "kadar", "kendi", "hakkında"]);
      const enStopWords = new Set(["the", "of", "and", "to", "a", "in", "is", "that", "it", "for", "on", "with", "as", "this", "are", "by", "from", "at", "an", "be", "how", "what", "why"]);

      const scores = children.map(child => {
        const text = child.textContent.toLowerCase().replace(/[^\w\sıişğüçö]/g, "");
        const words = text.split(/\s+/);
        
        let trCount = 0;
        let enCount = 0;
        
        words.forEach(word => {
          if (trStopWords.has(word)) trCount++;
          if (enStopWords.has(word)) enCount++;
        });
        
        if (trCount > enCount) return "tr";
        if (enCount > trCount) return "en";
        return "neutral";
      });

      // Maximize TRs before split point and ENs after split point
      let maxScore = -1;
      let bestSplitIndex = -1;

      // Restrict split boundaries to avoid empty slices
      const minIdx = Math.floor(children.length * 0.1);
      const maxIdx = Math.ceil(children.length * 0.9);

      for (let i = minIdx; i <= maxIdx; i++) {
        let trBefore = 0;
        let enAfter = 0;

        for (let j = 0; j < children.length; j++) {
          if (j < i) {
            if (scores[j] === "tr") trBefore++;
          } else {
            if (scores[j] === "en") enAfter++;
          }
        }

        const totalScore = trBefore + enAfter;
        if (totalScore > maxScore) {
          maxScore = totalScore;
          bestSplitIndex = i;
        }
      }

      // Check if the page is actually bilingual
      const totalTr = scores.filter(s => s === "tr").length;
      const totalEn = scores.filter(s => s === "en").length;

      if (totalTr >= 2 && totalEn >= 2) {
        splitIndex = bestSplitIndex;
        
        // Align splitIndex to nearby HR if any exists
        const searchRange = 2;
        for (let offset = -searchRange; offset <= searchRange; offset++) {
          const checkIdx = splitIndex + offset;
          if (checkIdx >= 0 && checkIdx < children.length) {
            if (children[checkIdx].tagName === "HR") {
              splitIndex = checkIdx;
              break;
            }
          }
        }
      }
    }

    if (splitIndex === -1) return; // Monolingual post, exit silently

    // Create language sections
    const trWrapper = document.createElement("div");
    trWrapper.className = "post-lang-section post-lang-tr";
    
    const enWrapper = document.createElement("div");
    enWrapper.className = "post-lang-section post-lang-en";

    // Distribute content
    children.forEach((child, idx) => {
      if (child === trHeader) {
        child.style.display = "none";
        return;
      }
      if (child === enHeader) {
        child.style.display = "none";
        return;
      }
      if (child.tagName === "HR" && idx === splitIndex) {
        child.style.display = "none";
        return;
      }

      if (idx < splitIndex) {
        trWrapper.appendChild(child.cloneNode(true));
        child.remove();
      } else {
        enWrapper.appendChild(child.cloneNode(true));
        child.remove();
      }
    });

    postContent.appendChild(trWrapper);
    postContent.appendChild(enWrapper);

    // Create & prepend language toggle buttons
    const switcher = document.createElement("div");
    switcher.className = "post-lang-switcher";
    switcher.innerHTML = `
      <button class="post-lang-btn" data-lang="tr">Türkçe</button>
      <button class="post-lang-btn" data-lang="en">English</button>
    `;
    postContent.insertBefore(switcher, postContent.firstChild);

    const buttons = switcher.querySelectorAll(".post-lang-btn");
    let activeLang = localStorage.getItem("preferred-blog-lang") || "tr";

    function setLanguage(lang) {
      activeLang = lang;
      localStorage.setItem("preferred-blog-lang", lang);
      
      buttons.forEach(btn => {
        if (btn.dataset.lang === lang) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });

      if (lang === "tr") {
        trWrapper.style.display = "block";
        enWrapper.style.display = "none";
      } else {
        trWrapper.style.display = "none";
        enWrapper.style.display = "block";
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", function() {
        setLanguage(this.dataset.lang);
      });
    });

    // Set initial language
    setLanguage(activeLang);
  })();
</script>
{{- end -}}
